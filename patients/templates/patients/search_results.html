<h2>Search Results</h2>

<p>Search: "{{ query }}"</p>

<table border="1" cellpadding="10">

<tr>
<th>File</th>
<th>Name</th>
<th>Action</th>
</tr>

{% for patient in patients %}

<tr>

<td>{{ patient.file_number }}</td>
<td>{{ patient.full_name }}</td>

<td>

<a href="/admin/patients/patient/{{ patient.id }}/change/">
Open
</a>

</td>

</tr>

{% empty %}

<tr>
<td colspan="3">No patients found</td>
</tr>

{% endfor %}

</table>
